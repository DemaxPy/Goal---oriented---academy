<!DOCTYPE html>
<html>
<head>
    <title>Registration Page</title>
</head>
<body>

    <h1> register here:</h1>

    <form>

        <label>Enter your full name:</label>
        <input type="text">

        <br><br>

        <label>Enter your email:</label>
        <input type="email">

        <br><br>

        <label>Enter your password:</label>
        <input type="password">

        <br><br>

        <label>Confirm your password:</label>
        <input type="password">

        <br><br>

        <label>Enter your gender:</label>

        <label>Male</label>
        <input type="checkbox">

        <label>Female</label>
        <input type="checkbox">

        <br><br>

        <label>Enter your address:</label>
        <input type="address">

        <br><br>

        <button>Submit</button>

    </form>

</body>
</html>


<!--- name და value ატრიბუტები გამოიყენება იმისთვის რომ input-ს ჰქონდეს სახელი ხოლო value ატრიბუტი გამოიყენება input-ში საწყისი მნიშვნელობის ჩასაწერად-->
